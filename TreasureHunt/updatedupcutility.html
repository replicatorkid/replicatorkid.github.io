<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Character Grid</title>

<style>
:root {
    --cols: 12;        /* updated from JS on load */
    --cell-size: 32px;
    --shift-size: 40px;
    --gap: 4px;
}

* { box-sizing: border-box; }
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

input.cell,
input.allowed {
    width: var(--cell-size);
    height: var(--cell-size);
    text-align: center;
    font-size: 20px;
    text-transform: uppercase;
    padding: 0;
    border: 1px solid #ccc;
}

.allowed-row {
    display: flex;
    gap: var(--gap);
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.grid-row {
    display: grid;
    grid-template-columns: var(--shift-size) repeat(var(--cols), var(--cell-size)) var(--shift-size);
    column-gap: var(--gap);
    align-items: center;
    margin: 4px 0;
}

.grid {
    display: flex;
    gap: var(--gap);
}

.shift-btn {
    width: var(--shift-size);
    height: var(--cell-size);
    font-size: 18px;
    padding: 0;
}

.random-btn {
    width: var(--cell-size);
    height: var(--cell-size);
    font-size: 18px;
    padding: 0;
}

.button-spacer {
    width: var(--shift-size);
    height: var(--cell-size);
}

.bottom-buttons {
    /* match the same grid as .grid-row to ensure alignment */
    display: grid;
    grid-template-columns: var(--shift-size) repeat(var(--cols), var(--cell-size)) var(--shift-size);
    column-gap: var(--gap);
    align-items: center;
    margin-top: 8px;
}

.column-duplicate {
    background-color: #ff9999 !important;
}

.grid-wrapper {
    display: flex;
}

.grid-controls {
    display: flex;
    flex-direction: column;
}
</style>
</head>

<body>

<h3>Allowed Characters</h3>
<div id="allowedRow" class="allowed-row"></div>

<h3>Grid</h3>
<div class="grid-wrapper">
    <div class="grid-controls">
        <div id="gridContainer"></div>
        <div id="bottomButtons" class="bottom-buttons"></div>
    </div>
</div>

<script>

const ROWS = 6;
const COLS = 12;

const allowedRow = document.getElementById("allowedRow");
const gridContainer = document.getElementById("gridContainer");
const bottomButtons = document.getElementById("bottomButtons");

// expose COLS to CSS so grid-template repeats match JS
document.documentElement.style.setProperty('--cols', String(COLS));

//
// Create top row
//
for (let i = 0; i < 20; i++) {
    const box = document.createElement("input");
    box.className = "allowed";
    box.maxLength = 1;

    box.addEventListener("input", () => {
        box.value = box.value.toUpperCase();
        checkDuplicates();
    });

    allowedRow.appendChild(box);
}

//
// Create grid rows using CSS grid (left shift, columns..., right shift)
//
for (let r = 0; r < ROWS; r++) {

    const rowDiv = document.createElement("div");
    rowDiv.className = "grid-row";

    const leftBtn = document.createElement("button");
    leftBtn.className = "shift-btn";
    leftBtn.textContent = "←";
    leftBtn.onclick = () => shiftRow(r, -1);

    const rightBtn = document.createElement("button");
    rightBtn.className = "shift-btn";
    rightBtn.textContent = "→";
    rightBtn.onclick = () => shiftRow(r, 1);

    rowDiv.appendChild(leftBtn);

    for (let c = 0; c < COLS; c++) {

        const box = document.createElement("input");
        box.className = "cell";
        box.maxLength = 1;
        box.dataset.row = r;
        box.dataset.col = c;

        box.addEventListener("input", validateGridInput);
        box.addEventListener("paste", (e) => handlePaste(e, r));

        rowDiv.appendChild(box);
    }

    rowDiv.appendChild(rightBtn);

    gridContainer.appendChild(rowDiv);
}

//
// Bottom buttons: create elements that fill the exact same grid
//
const leftSpacer = document.createElement("div");
leftSpacer.className = "button-spacer";

const rightSpacer = document.createElement("div");
rightSpacer.className = "button-spacer";

bottomButtons.appendChild(leftSpacer);

for (let c = 0; c < COLS; c++) {

    const btn = document.createElement("button");
    btn.className = "random-btn";
    btn.textContent = "↓";
    btn.onclick = () => fillColumn(c);

    bottomButtons.appendChild(btn);
}

bottomButtons.appendChild(rightSpacer);

//
// Helpers
//
function getAllowedCharacters() {

    const chars = [];

    document.querySelectorAll(".allowed").forEach(box => {

        const v = box.value.trim().toUpperCase();

        if (v && !chars.includes(v)) {
            chars.push(v);
        }
    });

    return chars;
}

function validateGridInput(event) {

    const allowed = getAllowedCharacters();

    let value = event.target.value.toUpperCase();

    if (value.length > 1) {
        value = value[0];
    }

    if (value && !allowed.includes(value)) {
        event.target.value = "";
    } else {
        event.target.value = value;
    }

    checkDuplicates();
}

function handlePaste(event, row) {
    event.preventDefault();
    
    const pastedText = (event.clipboardData || window.clipboardData).getData("text");
    const allowed = getAllowedCharacters();
    
    if (!pastedText) return;

    // Filter pasted text to only include allowed characters
    const validChars = pastedText
        .toUpperCase()
        .split("")
        .filter(ch => allowed.includes(ch))
        .slice(0, COLS);

    // Fill the row starting from column 0
    for (let c = 0; c < COLS; c++) {
        const cell = document.querySelector(
            `.cell[data-row="${row}"][data-col="${c}"]`
        );

        if (c < validChars.length) {
            cell.value = validChars[c];
        } else {
            cell.value = "";
        }
    }

    checkDuplicates();
}

function shiftRow(row, direction) {

    const cells = [];

    for (let c = 0; c < COLS; c++) {
        cells.push(
            document.querySelector(
                `.cell[data-row="${row}"][data-col="${c}"]`
            ).value
        );
    }

    if (direction < 0) {
        cells.push(cells.shift());
    } else {
        cells.unshift(cells.pop());
    }

    for (let c = 0; c < COLS; c++) {

        document.querySelector(
            `.cell[data-row="${row}"][data-col="${c}"]`
        ).value = cells[c];
    }

    checkDuplicates();
}

function fillColumn(col) {

    const allowed = getAllowedCharacters();

    if (allowed.length === 0) {
        return;
    }

    const existing = [];

    for (let r = 0; r < ROWS; r++) {

        const cell = document.querySelector(
            `.cell[data-row="${r}"][data-col="${col}"]`
        );

        if (cell.value) {
            existing.push(cell.value);
        }
    }

    const available = allowed.filter(
        ch => !existing.includes(ch)
    );

    if (available.length === 0) {
        return;
    }

    const empties = [];

    for (let r = 0; r < ROWS; r++) {

        const cell = document.querySelector(
            `.cell[data-row="${r}"][data-col="${col}"]`
        );

        if (!cell.value) {
            empties.push(cell);
        }
    }

    shuffle(available);

    empties.forEach(cell => {

        if (available.length > 0) {
            cell.value = available.pop();
        }
    });

    checkDuplicates();
}

function shuffle(array) {

    for (let i = array.length - 1; i > 0; i--) {

        const j = Math.floor(Math.random() * (i + 1));

        [array[i], array[j]] =
            [array[j], array[i]];
    }

    return array;
}

function checkDuplicates() {

    document.querySelectorAll(".cell").forEach(
        cell => cell.classList.remove("column-duplicate")
    );

    for (let c = 0; c < COLS; c++) {

        const seen = {};
        let duplicateFound = false;

        for (let r = 0; r < ROWS; r++) {

            const cell = document.querySelector(
                `.cell[data-row="${r}"][data-col="${c}"]`
            );

            const value = cell.value;

            if (!value) continue;

            if (seen[value]) {
                duplicateFound = true;
            }

            seen[value] = true;
        }

        if (duplicateFound) {

            for (let r = 0; r < ROWS; r++) {

                const cell = document.querySelector(
                    `.cell[data-row="${r}"][data-col="${c}"]`
                );

                cell.classList.add("column-duplicate");
            }
        }
    }
}

setInterval(checkDuplicates, 500);

</script>

</body>
</html>
