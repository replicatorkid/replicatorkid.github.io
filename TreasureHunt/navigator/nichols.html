<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backseat Driver</title>
    <style>
        body {
            margin: 0;
            background: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        #message {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #coordinates {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
            min-height: 30px;
        }
        button {
            font-size: 28px;
            padding: 16px 24px;
        }
    </style>
</head>
<body>

<div id="message">Tap to Start</div>
<div id="coordinates"></div>
<button id="startBtn">Begin Navigation</button>

<script>
const message = document.getElementById("message");
const coordinates = document.getElementById("coordinates");
const button = document.getElementById("startBtn");

// -----------------------------
// 1. ZONE DATA (your map layer)
// -----------------------------
const zones = [
    //Minimal paths. No redundancies.
    {
 street_a: "Nichol's Creek",
    street_b: "Cedar Lane",
    lat: 43.685002,
    lon: -88.020335,
    radius: 30,
    message: "North"
    },
    {
    street_a: "Cedar Lane",
    street_b: "N",
    lat: 43.688964,
    lon: -88.020185,
    radius: 55,
    message: "North"
    },
    {
    street_a: "Cedar Lane",
    street_b: "County U",
    lat: 43.704499,
    lon: -88.020561,
    radius: 55,
    message: "East"
    },
    {
    street_a: "County U",
    street_b: "County E",
    lat: 43.703825,
    lon: -87.990807,
    radius: 55,
    message: "North"
    },
    {
    street_a: "County E",
    street_b: "67",
    lat: 43.725272,
    lon: -87.989756,
    radius: 55,
    message: "East"
    },
    {
    street_a: "67",
    street_b: "County C",
    lat: 43.747502,
    lon: -87.981174,
    radius: 35,
    message: "North"
    },
    {
    street_a: "County C",
    street_b: "Park Street",
    lat: 43.751355,
    lon: -87.986262,
    radius: 35,
    message: "South"
    },
    {
    street_a: "Park",
    street_b: "Franklin",
    lat: 43.749713,
    lon: -87.986262,
    radius: 30,
    message: "East"
    },
    {
        street_a: "Plymouth",
        street_b: "Home",
        lat: 43.749728,
        lon: -87.984834,
        radius: 30,
        message: "Arrived! Dial TREASURE HUNT to claim your prize!"
    }
];

// -----------------------------
// 2. STATE TRACKING
// -----------------------------
let currentLat = null;
let currentLon = null;
let lastSpoken = {};
const COOLDOWN_MS = 5000;
let watchId = null;
let isSpeaking = false;

// -----------------------------
// 3. DISTANCE FUNCTION
// -----------------------------
function distanceMeters(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

// -----------------------------
// 4. TEXT TO SPEECH (with global lock)
// -----------------------------
function speak(text) {
    if (isSpeaking) return; // Reject if already speaking
    isSpeaking = true;
    
    window.speechSynthesis.cancel();
    
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 1;
    msg.pitch = 1;
    
    msg.onend = () => { isSpeaking = false; };
    msg.onerror = () => { isSpeaking = false; };
    
    setTimeout(() => {
        window.speechSynthesis.speak(msg);
    }, 50);
}

// -----------------------------
// 5. START GPS DISPLAY (continuous coordinates update)
// -----------------------------
function startGPSDisplay() {
    if (watchId !== null) return;
    
    watchId = navigator.geolocation.watchPosition((pos) => {
        currentLat = pos.coords.latitude;
        currentLon = pos.coords.longitude;
        coordinates.textContent = `Lat: ${currentLat.toFixed(4)}, Lon: ${currentLon.toFixed(4)}`;
    }, (err) => {
        coordinates.textContent = `GPS Error: ${err.message} (Code ${err.code})`;
    }, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 10000
    });
}

// -----------------------------
// 6. CHECK DIRECTIONS (on button press)
// -----------------------------
function checkDirections() {
    if (currentLat === null || currentLon === null) {
        message.textContent = "Waiting for GPS...";
        return;
    }
    
    let foundZone = false;
    zones.forEach((z) => {
        const d = distanceMeters(currentLat, currentLon, z.lat, z.lon);
        if (d <= z.radius) {
            message.textContent = z.message;
            speak(z.message);
            foundZone = true;
        }
    });
    
    if (!foundZone) {
        message.textContent = "Not at an intersection yet. Try again.";
    }
}

// -----------------------------
// 7. BUTTON HANDLER
// -----------------------------
button.addEventListener("click", () => {
    if (watchId === null) {
        // First click: start GPS and change button text
        message.textContent = "GPS Starting...";
        speak("Navigation initiated");
        startGPSDisplay();
        button.textContent = "Check Direction";
    } else {
        // Subsequent clicks: check for directions
        checkDirections();
    }
});
</script>

</body>
</html>
