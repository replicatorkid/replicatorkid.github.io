<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backseat Driver</title>
    <style>
        body {
            margin: 0;
            background: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        #message {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        button {
            font-size: 28px;
            padding: 16px 24px;
        }
    </style>
</head>
<body>

<div id="message">Tap to Start</div>
<button id="startBtn">Begin Navigation</button>

<script>
const message = document.getElementById("message");
const button = document.getElementById("startBtn");

// -----------------------------
// 1. ZONE DATA (your map layer)
// -----------------------------
const zones = [
    //Minimal paths. No redundancies.
    {

        street_b: "Z",

        lon: -88.025883,
        radius: 110,
        message: "East"
    },
    {

        street_b: "67",
        lat: 43.725063,
        lon: -88.026108,
        radius: 110,
        message: "East"
    },
    {
        street_a: "Parking Lot",
        street_b: "ZZ",
        lat: 43.733542,
        lon: -88.026059,
        radius: 200,
        message: "Drive"
    },
    {
        street_a: "Z",
        street_b: "Pioneer",
        lat: 43.746735,
        lon: -88.021001,
        radius: 110,
        message: "North"
    },
    {
        street_a: "Pioneer",
        street_b: "23",
        lat: 43.763950,
        lon: -88.021194,
        radius: 125,
        message: "East"
    },
    {
        street_a: "23",
        street_b: "North Wilwaukee",
        lat: 43.761769,
        lon: -87.985631,
        radius: 200,
        message: "South"
    },
    {
        street_a: "67",
        street_b: "Surkhe",
        lat: 43.756839,
        lon: -87.981322,
        radius: 50,
        message: "West"
    },
    {
        street_a: "Surkhe",
        street_b: "Krumrey",
        lat: 43.756824,
        lon: -87.986258,
        radius: 50,
        message: "West"
    },
    {
        street_a: "Surkhe",
        street_b: "Sunset",
        lat: 43.756799,
        lon: -87.988020,
        radius: 50,
        message: "South"
    },
    {
        street_a: "Sunset",
        street_b: "Western",
        lat: 43.752502,
        lon: -87.988983,
        radius: 50,
        message: "South-east"
    },
    {
        street_a: "Wester",

        lat: 43.750826,

        radius: 50,

    {
        street_a: "Plymouth",

        lat: 43.749728,
        lon: -87.984834,
        radius: 30,
        message: "Arrived! Dial one eight-hundred treasure to claim your prize!"
    },
    {
        street_a: "67",
        street_b: "PP",
        lat: 43.732475,
        lon: -87.981108,
        radius: 90,
        message: "North"
    },
    {
        street_a: "67",
        street_b: "Z",
        lat: 43.747484,
        lon: -87.981154,
        radius: 40,
        message: "West"
    },
    {
        street_a: "Z",
        street_b: "North Pleasant",
        lat: 43.747476,
        lon: -87.983718,
        radius: 20,
        message: "South"
    },
    {
        street_a: "Z",
        street_b: "Plymouth",
        lat: 43.746980,
        lon: -87.985006,
        radius: 40,
        message: "North"
    },
    {
        street_a: "Plymouth",
        street_b: "Main",
        lat: 43.748677,
        lon: -87.985017,
        radius: 30,
        message: "North"
    }
    //Redundancies
];

// -----------------------------
// 2. STATE TRACKING
// -----------------------------
let lastSpoken = {};
const COOLDOWN_MS = 3000;
let watchId = null; 

// -----------------------------
// 3. DISTANCE FUNCTION
// -----------------------------
function distanceMeters(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

// -----------------------------
// 4. TEXT TO SPEECH
// -----------------------------
function speak(text) {
    // Clear any previous hung utterances in iOS Safari queues
    window.speechSynthesis.cancel(); 
    
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 1;
    msg.pitch = 1;
    
    // Small timeout ensures the cancel event completes before speaking
    setTimeout(() => {
        window.speechSynthesis.speak(msg);
    }, 50);
}

// -----------------------------
// 5. MAIN GPS LOOP
// -----------------------------
function startTracking() {
    if (watchId !== null) return;
    
    message.textContent = "Tracking GPS...";
    button.style.display = "none";
    
    watchId = navigator.geolocation.watchPosition((pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        
        // Output coordinates to the screen to confirm live tracking is processing
        message.textContent = `Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}`;
        
        zones.forEach((z, i) => {
            const d = distanceMeters(lat, lon, z.lat, z.lon);
            if (d <= z.radius) {
                const now = Date.now();
                if (!lastSpoken[i] || now - lastSpoken[i] > COOLDOWN_MS) {
                    message.textContent = z.message;
                    speak(z.message);
                    lastSpoken[i] = now;
                }
            }
        });
    }, (err) => {
        // Output specific error codes for easier mobile debugging
        message.textContent = `GPS Error: ${err.message} (Code ${err.code})`;
    }, {
        enableHighAccuracy: true,
        maximumAge: 0, 
        timeout: 10000
    });
}

// -----------------------------
// 6. USER START (Optimized for iOS)
// -----------------------------
button.addEventListener("click", () => {
    message.textContent = "Initializing...";
    
    // 1. Force Speech API to unlock immediately inside the synchronous click path
    speak("Navigation initiated");
    
    // 2. Fire tracking immediately instead of nesting it to bypass Chrome iOS context hanging
    startTracking();
});
</script>

</body>
</html>
