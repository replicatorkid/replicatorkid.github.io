<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hebrew Speech Test</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding-top: 80px;
}

button {
    font-size: 24px;
    padding: 20px 40px;
    border-radius: 12px;
    border: none;
}

#status {
    margin-top: 30px;
    font-size: 20px;
    line-height: 1.5;
}
</style>
</head>
<body>

<h1>Hebrew Speech Test</h1>

<button id="startBtn">Start</button>

<div id="status">Waiting...</div>

<script>

const statusDiv = document.getElementById("status");
const startBtn = document.getElementById("startBtn");

async function requestMic() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            audio: true
        });

        statusDiv.innerHTML += "<br>Microphone granted.";

        stream.getTracks().forEach(track => track.stop());

        return true;
    }
    catch (err) {
        statusDiv.innerHTML += "<br>Microphone denied: " + err.message;
        return false;
    }
}

function speakHebrew() {

    return new Promise(resolve => {

        const utterance = new SpeechSynthesisUtterance(
            "שלום. אני מדבר עברית."
        );

        utterance.lang = "he-IL";
        utterance.rate = 0.9;

        utterance.onend = resolve;

        speechSynthesis.speak(utterance);
    });
}

startBtn.addEventListener("click", async () => {

    startBtn.disabled = true;

    statusDiv.innerHTML = "Requesting microphone permission...";

    await requestMic();

    statusDiv.innerHTML += "<br>Attempting Hebrew speech...";

    await speakHebrew();

    statusDiv.innerHTML += "<br>Finished speaking.";

});

</script>

</body>
</html>
