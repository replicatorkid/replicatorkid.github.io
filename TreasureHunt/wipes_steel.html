<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centered Word Column</title>

<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: white;
        font-family: Arial, sans-serif;
    }

    #wordColumn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px; /* Vertical spacing between lines */
    }

    .word {
        font-size: 24px;
        text-align: center;
    }
</style>
</head>
<body>

<div id="wordColumn"></div>

<script>
const words = [
    "South on Krumrey St",
    "East on Suhrke Rd",
    "North on State 67",
    "East on State 23",
    "North on County M",
    "West on County O",
    "North on Rio Rd",
    "Sheboygan River",
    "Plate Steel"
];

const container = document.getElementById("wordColumn");

words.forEach(text => {

    // Remove whitespaces
    text = text.replace(/\s+/g, "");
    
    // Scramble the letters of this word
    let chars = text.split("");

    for (let i = chars.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [chars[i], chars[j]] = [chars[j], chars[i]];
    }

    const scrambled = chars.join("");

    const div = document.createElement("div");
    div.className = "word";
    div.textContent = scrambled;
    container.appendChild(div);
});
</script>

</body>
</html>
