<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backseat Driver</title>
    <style>
        body {
            margin: 0;
            background: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        #message {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        button {
            font-size: 28px;
            padding: 16px 24px;
        }
    </style>
</head>
<body>

<div id="message">Tap to Start</div>
<button id="startBtn">Begin Navigation</button>

<script>
const message = document.getElementById("message");
const button = document.getElementById("startBtn");

// -----------------------------
// 1. ZONE DATA (your map layer)
// -----------------------------
const zones = [
    {
    street_a: "Nichol's Creek",
    street_b: "Cedar Lane",
    lat: 43.685002,
    lon: -88.020335,
    radius: 30,
    message: "North"
    },
    {
    street_a: "Cedar Lane",
    street_b: "N",
    lat: 43.688964,
    lon: -88.020185,
    radius: 55,
    message: "North"
    },
    {
    street_a: "Cedar Lane",
    street_b: "County U",
    lat: 43.704499,
    lon: -88.020561,
    radius: 55,
    message: "East"
    },
    {
    street_a: "County U",
    street_b: "County E",
    lat: 43.703825,
    lon: -87.990807,
    radius: 55,
    message: "North"
    },
    {
    street_a: "County E",
    street_b: "67",
    lat: 43.725272,
    lon: -87.989756,
    radius: 55,
    message: "East"
    },
    {
    street_a: "67",
    street_b: "C",
    lat: 43.747502,
    lon: -87.981174,
    radius: 35,
    message: "North"
    },
    {
    street_a: "County C",
    street_b: "Park Street",
    lat: 43.751355,
    lon: -87.986262,
    radius: 35,
    message: "South"
    },
    {
    street_a: "Park",
    street_b: "Franklin",
    lat: 43.749713,
    lon: -87.986262,
    radius: 30,
    message: "East"
    },
    {
        street_a: "Plymouth",
        street_b: "Home",
        lat: 43.749728,
        lon: -87.984834,
        radius: 30,
        message: "Arrived! Dial one eight-hundred treasure to claim your prize!"
    }
];

// -----------------------------
// 2. STATE TRACKING
// -----------------------------
let lastSpoken = {};
const COOLDOWN_MS = 3000;
let watchId = null; 

// -----------------------------
// 3. DISTANCE FUNCTION
// -----------------------------
function distanceMeters(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

// -----------------------------
// 4. TEXT TO SPEECH
// -----------------------------
function speak(text) {
    // Clear any previous hung utterances in iOS Safari queues
    window.speechSynthesis.cancel(); 
    
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 1;
    msg.pitch = 1;
    
    // Small timeout ensures the cancel event completes before speaking
    setTimeout(() => {
        window.speechSynthesis.speak(msg);
    }, 50);
}

// -----------------------------
// 5. MAIN GPS LOOP
// -----------------------------
function startTracking() {
    if (watchId !== null) return;
    
    message.textContent = "Tracking GPS...";
    button.style.display = "none";
    
    watchId = navigator.geolocation.watchPosition((pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        
        // Output coordinates to the screen to confirm live tracking is processing
        message.textContent = `Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}`;
        
        zones.forEach((z, i) => {
            const d = distanceMeters(lat, lon, z.lat, z.lon);
            if (d <= z.radius) {
                const now = Date.now();
                if (!lastSpoken[i] || now - lastSpoken[i] > COOLDOWN_MS) {
                    message.textContent = z.message;
                    speak(z.message);
                    lastSpoken[i] = now;
                }
            }
        });
    }, (err) => {
        // Output specific error codes for easier mobile debugging
        message.textContent = `GPS Error: ${err.message} (Code ${err.code})`;
    }, {
        enableHighAccuracy: true,
        maximumAge: 0, 
        timeout: 10000
    });
}

// -----------------------------
// 6. USER START (Optimized for iOS)
// -----------------------------
button.addEventListener("click", () => {
    message.textContent = "Initializing...";
    
    // 1. Force Speech API to unlock immediately inside the synchronous click path
    speak("Navigation initiated");
    
    // 2. Fire tracking immediately instead of nesting it to bypass Chrome iOS context hanging
    startTracking();
});
</script>

</body>
</html>
