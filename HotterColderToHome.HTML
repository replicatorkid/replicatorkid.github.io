<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotter Colder</title>
    <style>
        body {
            margin: 0;
            background: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        #message {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #distance {
            font-size: 24px;
            color: #666;
            margin-bottom: 20px;
        }
        button {
            font-size: 28px;
            padding: 16px 24px;
        }
    </style>
</head>
<body>

<div id="message">Tap to Start</div>
<div id="distance"></div>
<button id="startBtn">Begin Navigation</button>

<script>
const message = document.getElementById("message");
const distance = document.getElementById("distance");
const button = document.getElementById("startBtn");

// -----------------------------
// 1. TARGET COORDINATE
// -----------------------------
const TARGET = {
    lat: 43.750831,
    lon: -87.985005,
    name: "Home"
};

// -----------------------------
// 2. STATE TRACKING
// -----------------------------
let lastDistance = null;
let watchId = null;
let updateInterval = null;

// -----------------------------
// 3. DISTANCE FUNCTION
// -----------------------------
function distanceMeters(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

// -----------------------------
// 4. TEXT TO SPEECH
// -----------------------------
function speak(text) {
    window.speechSynthesis.cancel();
    
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 1;
    msg.pitch = 1;
    
    setTimeout(() => {
        window.speechSynthesis.speak(msg);
    }, 50);
}

// -----------------------------
// 5. FEEDBACK FUNCTION
// -----------------------------
function provideFeedback(currentDistance) {
    let feedback = "";
    
    if (lastDistance === null) {
        // First reading
        // feedback = `Starting distance: ${Math.round(currentDistance)} meters`;
        feedback = `Starting distance: tomato meters`;
    } else if (currentDistance < lastDistance) {
        const diff = Math.round(lastDistance - currentDistance);
        // feedback = `Hotter! ${diff} meters closer. Now ${Math.round(currentDistance)} meters away.`;
        feedback = 'Hotter!';
    } else if (currentDistance > lastDistance) {
        const diff = Math.round(currentDistance - lastDistance);
        // feedback = `Colder. ${diff} meters farther. Now ${Math.round(currentDistance)} meters away.`;
        feedback = 'Colder.';
    } else {
        // feedback = `Same distance: ${Math.round(currentDistance)} meters away.`;
        feedback = 'Huh. Yep. Still not there.';
    }
    
    message.textContent = feedback;
    distance.textContent = `Distance: ${Math.round(currentDistance)}m`;
    speak(feedback);
    lastDistance = currentDistance;
}

// -----------------------------
// 6. MAIN GPS LOOP
// -----------------------------
function startTracking() {
    if (watchId !== null) return;
    
    message.textContent = "Tracking GPS...";
    button.style.display = "none";
    
    watchId = navigator.geolocation.watchPosition((pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        
        const d = distanceMeters(lat, lon, TARGET.lat, TARGET.lon);
        
        // Schedule feedback every 5 seconds
        if (updateInterval) clearInterval(updateInterval);
        
        updateInterval = setInterval(() => {
            provideFeedback(d);
        }, 5000);
        
        // Provide initial feedback immediately
        provideFeedback(d);
        
    }, (err) => {
        message.textContent = `GPS Error: ${err.message} (Code ${err.code})`;
    }, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 10000
    });
}

// -----------------------------
// 7. USER START
// -----------------------------
button.addEventListener("click", () => {
    message.textContent = "Initializing...";
    
    speak("Navigation initiated");
    startTracking();
});
</script>

</body>
</html>
