<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compass Test</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    background:white;
    overflow:hidden;
    font-family:sans-serif;
}

body{
    display:flex;
    flex-direction:column;
}

.half{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

svg{
    width:65vmin;
    height:65vmin;
    max-width:420px;
    max-height:420px;
}
    
.lower{
    flex-direction:column;
}

#distance{
    margin-top:18px;
    font-size:24px;
    font-weight:bold;
    text-align:center;
    min-height:1.2em;
}
</style>
</head>

<body>

<div class="half lower">

<svg viewBox="0 0 200 200">

    <!-- Outer Circle -->
    <circle cx="100" cy="100" r="90"
            fill="white"
            stroke="black"
            stroke-width="2"/>

    <!-- Cardinal Labels -->
    <text x="100" y="20"
      text-anchor="middle"
      dominant-baseline="middle">N</text>
    <text x="180" y="100"
          text-anchor="middle"
          dominant-baseline="middle">E</text>
    <text x="100" y="180"
          text-anchor="middle"
          dominant-baseline="middle">S</text>
    <text x="20" y="100"
          text-anchor="middle"
          dominant-baseline="middle">W</text>

    <!-- Needle -->
    <g id="needle1">
        <polygon points="100,34 106,100 100,94 94,100"
                 fill="black"/>
        <circle cx="100" cy="100" r="4" fill="black"/>
    </g>

</svg>

</div>

<div class="half">

<svg viewBox="0 0 200 200">

    <circle cx="100" cy="100" r="90"
            fill="white"
            stroke="black"
            stroke-width="2"/>

    <text x="100" y="20"
          text-anchor="middle"
          dominant-baseline="middle">N</text>
    <text x="180" y="100"
          text-anchor="middle"
          dominant-baseline="middle">E</text>
    <text x="100" y="180"
          text-anchor="middle"
          dominant-baseline="middle">S</text>
    <text x="20" y="100"
          text-anchor="middle"
          dominant-baseline="middle">W</text>

    <g id="needle2">
        <polygon points="100,34 106,100 100,94 94,100"
                 fill="black"/>
        <circle cx="100" cy="100" r="4" fill="black"/>
    </g>

</svg>

    <div id="distance">---</div>
    
</div>

<script>

let northAngle=0;
let targetAngle=180;

const needle1=document.getElementById("needle1");
const needle2=document.getElementById("needle2");
const distanceDisplay = document.getElementById("distance");
    
function animate(){

    northAngle+=0.5;
    targetAngle-=0.8;

    needle1.setAttribute(
        "transform",
        `rotate(${northAngle} 100 100)`
    );

    needle2.setAttribute(
        "transform",
        `rotate(${targetAngle} 100 100)`
    );

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
