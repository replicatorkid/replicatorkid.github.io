<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Marble Test</title>
<style>
  body { margin: 0; overflow: hidden; background: #f4f4f4; }
  canvas { display: block; }
  button {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
    padding: 12px;
  }
</style>
</head>
<body>

<button id="start">Enable Motion</button>
<canvas id="c"></canvas>

<script src="sensor.js"></script>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --------------------
// SETTINGS
// --------------------
const damping = 0.985;
const tiltScale = 0.08;
const northScale = tiltScale / 3; // 1/3 of tilt scale

// --------------------
// SENSOR FUSION
// --------------------
function getSensorForce() {
  let fx = 0;
  let fy = 0;

  // Tilt force (from Sensors.orientation.pitch and roll)
  if (Sensors.orientation.pitch != null) {
    fx += Sensors.orientation.roll * tiltScale;
    fy += Sensors.orientation.pitch * tiltScale;
  }

  // North-seeking force
  if (Sensors.orientation.heading != null) {
    // heading: 0° = north, 90° = east, 180° = south, 270° = west
    // Convert to radians
    const heading = Sensors.orientation.heading * (Math.PI / 180);
    
    // North is up on screen (-Y), so:
    // north force = (sin(heading), -cos(heading))
    const northFx = Math.sin(heading) * northScale;
    const northFy = -Math.cos(heading) * northScale;
    
    fx += northFx;
    fy += northFy;
  }

  // Soft stabilization
  fx *= 0.92;
  fy *= 0.92;

  return { fx, fy };
}

// --------------------
// PERMISSION + START
// --------------------
document.getElementById("start").onclick = async () => {
  await Sensors.start();
  document.getElementById("start").style.display = "none";
};
  
// --------------------
// MARBLE STATE
// --------------------
function makeMarble(x, y) {
    return {
        x,
        y,
        vx: 0,
        vy: 0,
        r: 40,

        // Tiny hidden differences between marbles
        mass: 1 + (Math.random() - 0.5) * 0.04,
        damping: damping + (Math.random() - 0.5) * 0.003
    };
}

const marbles = [
    makeMarble(canvas.width * 0.35, canvas.height * 0.40),
    makeMarble(canvas.width * 0.50, canvas.height * 0.40),
    makeMarble(canvas.width * 0.65, canvas.height * 0.40),
    makeMarble(canvas.width * 0.425, canvas.height * 0.58),
    makeMarble(canvas.width * 0.575, canvas.height * 0.58),
    makeMarble(canvas.width * 0.35, canvas.height * 0.76),
    makeMarble(canvas.width * 0.50, canvas.height * 0.76),
    makeMarble(canvas.width * 0.65, canvas.height * 0.76)
];

// --------------------
// Inter-marble collisions
// --------------------
function resolveMarbleCollisions() {

    for (let i = 0; i < marbles.length; i++) {

        for (let j = i + 1; j < marbles.length; j++) {

            const a = marbles[i];
            const b = marbles[j];

            let dx = b.x - a.x;
            let dy = b.y - a.y;

            let dist = Math.hypot(dx, dy);

            let minDist = a.r + b.r;

            if (dist >= minDist)
                continue;

            // Prevent divide-by-zero.
            if (dist < 0.0001) {
                dx = 1;
                dy = 0;
                dist = 1;
            }

            //------------------------------------------------------
            // Push the marbles apart so they no longer overlap.
            //------------------------------------------------------

            const nx = dx / dist;
            const ny = dy / dist;

            const overlap = minDist - dist;

            a.x -= nx * overlap * 0.5;
            a.y -= ny * overlap * 0.5;

            b.x += nx * overlap * 0.5;
            b.y += ny * overlap * 0.5;

            //------------------------------------------------------
            // Exchange velocity along the collision normal.
            //------------------------------------------------------

            const dvx = b.vx - a.vx;
            const dvy = b.vy - a.vy;

            const impact = dvx * nx + dvy * ny;

            if (impact > 0)
                continue;

            const bounce = 0.85;

            const impulse = impact * bounce;
            
            const invMassA = 1 / a.mass;
            const invMassB = 1 / b.mass;
            const totalInvMass = invMassA + invMassB;
            
            a.vx += impulse * nx * (invMassA / totalInvMass);
            a.vy += impulse * ny * (invMassA / totalInvMass);
            
            b.vx -= impulse * nx * (invMassB / totalInvMass);
            b.vy -= impulse * ny * (invMassB / totalInvMass);
        }
    }
}
  
// --------------------
// UPDATE LOOP
// --------------------
function update() {

    const force = getSensorForce();

    for (const marble of marbles) {

        marble.vx += force.fx;
        marble.vy += force.fy;

        // Tiny Brownian motion
        marble.vx += (Math.random() - 0.5) * 0.015;
        marble.vy += (Math.random() - 0.5) * 0.015;
      
        marble.vx *= marble.damping;
        marble.vy *= marble.damping;

        marble.x += marble.vx;
        marble.y += marble.vy;

        // walls
        if (marble.x < marble.r) {
            marble.x = marble.r;
            marble.vx *= -0.6;
        }

        if (marble.x > canvas.width - marble.r) {
            marble.x = canvas.width - marble.r;
            marble.vx *= -0.6;
        }

        if (marble.y < marble.r) {
            marble.y = marble.r;
            marble.vy *= -0.6;
        }

        if (marble.y > canvas.height - marble.r) {
            marble.y = canvas.height - marble.r;
            marble.vy *= -0.6;
        }
    }

    resolveMarbleCollisions();
  
    draw();
    requestAnimationFrame(update);
}

// --------------------
// RENDER
// --------------------
function draw() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // tray
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(20, 20, canvas.width - 40, canvas.height - 40);

    for (const marble of marbles) {

        const grad = ctx.createRadialGradient(
            marble.x - 5,
            marble.y - 5,
            2,
            marble.x,
            marble.y,
            marble.r
        );

        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(1, "#9a9a9a");

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(marble.x, marble.y, marble.r, 0, Math.PI * 2);
        ctx.fill();
    }
}

// start
update();
</script>

</body>
</html>
