<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Leaflet Map Layout</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        #map {
            width: 80%;
            height: 100%;
        }

        #sidebar {
            width: 20%;
            height: 100%;
            box-sizing: border-box;
            padding: 1rem;
            border-left: 1px solid #ccc;
            overflow-y: auto;
            font-family: Arial, sans-serif;
        }

        #sidebar h2 {
            margin-top: 0;
        }
        #output {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            resize: none;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>

<dialog id="locationDialog">
    <form method="dialog">
        <h3>Location Data</h3>

        <label>
            Radius (meters):
            <input id="radiusInput" type="number" value="15">
        </label>

        <br><br>

        <label>
            Street A:
            <input id="streetAInput" type="text">
        </label>

        <br><br>

        <label>
            Street B:
            <input id="streetBInput" type="text">
        </label>

        <br><br>

        <label>
            Message:
            <input id="messageInput" type="text">
        </label>

        <br><br>

        <button type="button" id="applyButton">Apply</button>
        <button type="button" id="cancelButton">Cancel</button>
    </form>
</dialog>

<body>

<div id="container">
    <div id="map"></div>

    <div id="sidebar">
        <textarea id="output"></textarea>
    </div>
</div>

<script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
></script>

<script>
const map = L.map('map').setView([43.739051, -87.957069], 13);

const circleLayer = L.layerGroup().addTo(map);

function parseDirection(msg) {
    if (!msg) return null;
    const normalized = msg.toLowerCase();
    const m = normalized.match(/(northwest|north-west|north west|northeast|north-east|north east|southwest|south-west|south west|southeast|south-east|south east|north|south|east|west|\bn\b|\bs\b|\be\b|\bw\b|\bne\b|\bnw\b|\bse\b|\bsw\b)/);
    if (!m) return null;
    const token = m[1].replace(/[-\s]/g, '');
    switch (token) {
        case 'n':
        case 'north': return 0;
        case 'ne':
        case 'northeast': return 45;
        case 'e':
        case 'east': return 90;
        case 'se':
        case 'southeast': return 135;
        case 's':
        case 'south': return 180;
        case 'sw':
        case 'southwest': return 225;
        case 'w':
        case 'west': return 270;
        case 'nw':
        case 'northwest': return 315;
    }
    return null;
}

// destination point given start lat/lon (degrees), distance in meters, bearing in degrees
function destinationPoint(lat, lon, distance, bearing) {
    const R = 6378137; // Earth's radius in meters (WGS-84)
    const δ = distance / R; // angular distance in radians
    const θ = (bearing * Math.PI) / 180; // bearing in radians

    const φ1 = (lat * Math.PI) / 180;
    const λ1 = (lon * Math.PI) / 180;

    const sinφ1 = Math.sin(φ1);
    const cosφ1 = Math.cos(φ1);
    const sinδ = Math.sin(δ);
    const cosδ = Math.cos(δ);

    const sinφ2 = sinφ1 * cosδ + cosφ1 * sinδ * Math.cos(θ);
    const φ2 = Math.asin(Math.max(-1, Math.min(1, sinφ2)));

    const y = Math.sin(θ) * sinδ * cosφ1;
    const x = cosδ - sinφ1 * Math.sin(φ2);
    const λ2 = λ1 + Math.atan2(y, x);

    const lat2 = (φ2 * 180) / Math.PI;
    const lon2 = ((λ2 * 180) / Math.PI + 540) % 360 - 180; // normalize to -180..+180

    return [lat2, lon2];
}

function redrawCircles() {

    circleLayer.clearLayers();

    const text = output.value;

    const regex =
        /lat:\s*(-?\d+(?:\.\d+)?)\s*,[\s\S]*?lon:\s*(-?\d+(?:\.\d+)?)\s*,[\s\S]*?radius:\s*(\d+(?:\.\d+)?)[\s\S]*?message:\s*"([^"]*)"/g;

    let match;

    while ((match = regex.exec(text)) !== null) {

        const lat = parseFloat(match[1]);
        const lon = parseFloat(match[2]);
        const radius = parseFloat(match[3]);
        const message = match[4] || "";

        L.circle([lat, lon], {
            radius: radius,
            weight: 2,
            fillOpacity: 0.25
        }).addTo(circleLayer);

        // try to parse a compass direction from the message
        const bearing = parseDirection(message);
        if (bearing !== null) {
            // draw a line from the center out to 1.5x the radius
            const distance = radius * 1.5;
            const dest = destinationPoint(lat, lon, distance, bearing);
            L.polyline([[lat, lon], dest], {color: '#000', weight: 2}).addTo(circleLayer);
        }
    }
}

L.tileLayer(
    'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
    }
).addTo(map);

let mouseLat = null;
let mouseLon = null;

const dialog = document.getElementById("locationDialog");
const output = document.getElementById("output");

map.on("mousemove", function(e) {
    mouseLat = e.latlng.lat;
    mouseLon = e.latlng.lng;
});

document.getElementById("cancelButton").addEventListener("click", () => {
    dialog.close();
});

document.getElementById("applyButton").addEventListener("click", () => {

    const lat = mouseLat;
    const lon = mouseLon;

    const radius =
        document.getElementById("radiusInput").value;

    const streetA =
        document.getElementById("streetAInput").value;

    const streetB =
        document.getElementById("streetBInput").value;

    const message =
        document.getElementById("messageInput").value;

    const block =`{
    street_a: "${streetA}",
    street_b: "${streetB}",
    lat: ${lat.toFixed(6)},
    lon: ${lon.toFixed(6)},
    radius: ${radius},
    message: "${message}"
},

`;

    output.value += block;
    redrawCircles();

    document.getElementById("radiusInput").value = 15;
    document.getElementById("streetAInput").value = "";
    document.getElementById("streetBInput").value = "";
    document.getElementById("messageInput").value = "";

    dialog.close();
});

output.addEventListener("input", redrawCircles);

document.addEventListener("keyup", function(event) {

    if (event.key.toLowerCase() !== "q") {
        return;
    }

    const mapElement = document.getElementById("map");

    if (!mapElement.matches(":hover")) {
        return;
    }

    if (mouseLat === null || mouseLon === null) {
        return;
    }

    dialog.showModal();
});
</script>

</body>
</html>
