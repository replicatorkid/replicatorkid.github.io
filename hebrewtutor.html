<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hebrew Speech Test</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding-top: 80px;
}

button {
    font-size: 24px;
    padding: 20px 40px;
    border-radius: 12px;
    border: none;
}

#status {
    margin-top: 30px;
    font-size: 20px;
    line-height: 1.5;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
}
</style>
</head>
<body>

<h1>Hebrew Speech Test</h1>

<button id="startBtn">Start</button>

<div id="status">Waiting...</div>

<script>

const statusDiv = document.getElementById("status");
const startBtn = document.getElementById("startBtn");

async function requestMic() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            audio: true
        });

        statusDiv.innerHTML += "<br>Microphone granted.";

        stream.getTracks().forEach(track => track.stop());

        return true;
    }
    catch (err) {
        statusDiv.innerHTML += "<br>Microphone denied: " + err.message;
        return false;
    }
}

// Wait for voices to be available (handles WebKit/iOS behavior)
function getVoicesAsync(timeout = 2000) {
    return new Promise(resolve => {
        const voices = speechSynthesis.getVoices();
        if (voices && voices.length > 0) {
            resolve(voices);
            return;
        }
        // voices may be loaded asynchronously; listen for event
        function handleVoicesChanged() {
            const v = speechSynthesis.getVoices();
            if (v && v.length > 0) {
                cleanup();
                resolve(v);
            }
        }
        function cleanup() {
            speechSynthesis.removeEventListener('voiceschanged', handleVoicesChanged);
            if (timer) clearTimeout(timer);
        }
        speechSynthesis.addEventListener('voiceschanged', handleVoicesChanged);
        const timer = setTimeout(() => {
            cleanup();
            resolve(speechSynthesis.getVoices() || []);
        }, timeout);
    });
}

function findHebrewVoice(voices) {
    if (!voices || !voices.length) return null;
    const lowerLang = (s) => s ? s.toLowerCase() : '';
    // Find any voice where lang starts with 'he' (he or he-IL)
    for (const v of voices) {
        if (v.lang && lowerLang(v.lang).startsWith('he')) return v;
    }
    // Also check voice name hints (some locales may have misleading lang)
    for (const v of voices) {
        const name = v.name ? v.name.toLowerCase() : '';
        if (name.includes('hebrew') || name.includes('he')) return v;
    }
    return null;
}

function speakText(text, options = {}) {
    return new Promise(resolve => {
        const utterance = new SpeechSynthesisUtterance(text);
        if (options.lang) utterance.lang = options.lang;
        if (options.voice) utterance.voice = options.voice;
        if (options.rate) utterance.rate = options.rate;
        if (options.pitch) utterance.pitch = options.pitch;

        utterance.onend = () => resolve(true);
        utterance.onerror = () => resolve(false);

        // Speak (must be in user gesture on iOS)
        speechSynthesis.speak(utterance);
    });
}

async function speakHebrewOrTransliteration() {
    const hebrewText = "שלום. אני מדבר עברית.";
    const transliteration = "Shalom. Ani medaber Ivrit.";

    statusDiv.innerHTML += "<br>Checking available TTS voices...";

    const voices = await getVoicesAsync(2500);

    // Debug: show voices (useful to see what Safari/iOS reports)
    if (voices && voices.length) {
        statusDiv.innerHTML += "<br>Voices available (" + voices.length + "): ";
        statusDiv.innerHTML += voices.map(v => {
            return "[" + (v.name || "unnamed") + " (" + (v.lang || "unknown") + ")]";
        }).join(" ");
    } else {
        statusDiv.innerHTML += "<br>No voices reported by speechSynthesis.getVoices().";
    }

    const hebVoice = findHebrewVoice(voices);

    if (hebVoice) {
        statusDiv.innerHTML += "<br>Hebrew voice found: " + (hebVoice.name || hebVoice.lang) + ". Speaking Hebrew text.";
        await speakText(hebrewText, { lang: hebVoice.lang || "he-IL", voice: hebVoice, rate: 0.9 });
    } else {
        statusDiv.innerHTML += "<br>No Hebrew voice available — falling back to transliteration spoken with an English voice.";
        // Choose an English or default voice if available
        let enVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('en')) || voices[0] || null;
        await speakText(transliteration, { lang: enVoice ? enVoice.lang : "en-US", voice: enVoice, rate: 0.95 });
    }
}

startBtn.addEventListener("click", async () => {

    startBtn.disabled = true;

    statusDiv.innerHTML = "Requesting microphone permission...";

    await requestMic();

    statusDiv.innerHTML += "<br>Attempting Hebrew speech (or transliteration fallback)...";

    await speakHebrewOrTransliteration();

    statusDiv.innerHTML += "<br>Finished speaking.";

    startBtn.disabled = false;

});

</script>

</body>
</html>
