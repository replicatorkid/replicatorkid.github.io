<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Marble Test</title>
<style>
  body { margin: 0; overflow: hidden; background: #f4f4f4; }
  canvas { display: block; }
  button {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
    padding: 12px;
  }
</style>
</head>
<body>

<button id="start">Enable Motion</button>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --------------------
// MARBLE STATE
// --------------------
const marble = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  vx: 0,
  vy: 0,
  r: 40
};

// --------------------
// SENSOR STATE
// --------------------
let rawTiltX = 0;
let rawTiltY = 0;

let rawMotionX = 0;
let rawMotionY = 0;

// --------------------
// SETTINGS
// --------------------
const damping = 0.985;

// --------------------
// INPUT: ORIENTATION
// --------------------
function handleOrientation(event) {
  rawTiltX = event.gamma || 0;      // left/right
  rawTiltY = event.beta || 0;     // up/down
}

// --------------------
// INPUT: MOTION...
// --------------------
function handleMotion(event) {
  const a = event.acceleration;
  if (!a) return;

  rawMotionX = a.x || 0;
  rawMotionY = a.y || 0;
}

// --------------------
// SENSOR FUSION (IMPORTANT)
// --------------------
function getSensorForce() {
  //const tiltScale = 0.08;
  const tiltScale = 0.0;
  //const motionScale = 0.6;
  const motionScale = -1.0;

  let fx = rawTiltX * tiltScale;
  let fy = rawTiltY * tiltScale;

  fx -= rawMotionX * motionScale;
  fy += rawMotionY * motionScale;

  // soft stabilization
  fx *= 0.88;
  fy *= 0.88;

  return { fx, fy };
}

// --------------------
// PERMISSION + START
// --------------------
document.getElementById("start").onclick = async () => {
  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    const res = await DeviceOrientationEvent.requestPermission();
    if (res !== "granted") return;
  }

  window.addEventListener("deviceorientation", handleOrientation);
  window.addEventListener("devicemotion", handleMotion);

  document.getElementById("start").style.display = "none";
};

// --------------------
// UPDATE LOOP
// --------------------
function update() {
  const force = getSensorForce();

  marble.vx += force.fx;
  marble.vy += force.fy;

  marble.vx *= damping;
  marble.vy *= damping;

  marble.x += marble.vx;
  marble.y += marble.vy;

  // walls
  if (marble.x < marble.r) { marble.x = marble.r; marble.vx *= -0.6; }
  if (marble.x > canvas.width - marble.r) { marble.x = canvas.width - marble.r; marble.vx *= -0.6; }

  if (marble.y < marble.r) { marble.y = marble.r; marble.vy *= -0.6; }
  if (marble.y > canvas.height - marble.r) { marble.y = canvas.height - marble.r; marble.vy *= -0.6; }

  draw();
  requestAnimationFrame(update);
}

// --------------------
// RENDER
// --------------------
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // tray
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(20, 20, canvas.width - 40, canvas.height - 40);

  // marble shading
  const grad = ctx.createRadialGradient(
    marble.x - 5, marble.y - 5, 2,
    marble.x, marble.y, marble.r
  );

  grad.addColorStop(0, "#ffffff");
  grad.addColorStop(1, "#9a9a9a");

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(marble.x, marble.y, marble.r, 0, Math.PI * 2);
  ctx.fill();
}

// start
update();
</script>

</body>
</html>
