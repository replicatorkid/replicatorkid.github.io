<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compass Test</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    background:white;
    overflow:hidden;
    font-family:sans-serif;
}

body{
    display:flex;
    flex-direction:column;
}

.half{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

svg{
    width:85vmin;
    height:85vmin;
    max-width:420px;
    max-height:420px;
}
</style>
</head>

<body>

<div class="half">

<svg viewBox="0 0 200 200">

    <!-- Outer Circle -->
    <circle cx="100" cy="100" r="90"
            fill="white"
            stroke="black"
            stroke-width="2"/>

    <!-- Cardinal Labels -->
    <text x="100" y="24" text-anchor="middle" font-size="14">N</text>
    <text x="176" y="105" text-anchor="middle" font-size="14">E</text>
    <text x="100" y="190" text-anchor="middle" font-size="14">S</text>
    <text x="24" y="105" text-anchor="middle" font-size="14">W</text>

    <!-- Tick Marks -->
    <g id="ticks"></g>

    <!-- Needle -->
    <g id="needle1">
        <polygon points="100,34 106,100 100,94 94,100"
                 fill="black"/>
        <circle cx="100" cy="100" r="4" fill="black"/>
    </g>

</svg>

</div>

<div class="half">

<svg viewBox="0 0 200 200">

    <circle cx="100" cy="100" r="90"
            fill="white"
            stroke="black"
            stroke-width="2"/>

    <text x="100" y="24" text-anchor="middle" font-size="14">N</text>
    <text x="176" y="105" text-anchor="middle" font-size="14">E</text>
    <text x="100" y="190" text-anchor="middle" font-size="14">S</text>
    <text x="24" y="105" text-anchor="middle" font-size="14">W</text>

    <g id="ticks2"></g>

    <g id="needle2">
        <polygon points="100,34 106,100 100,94 94,100"
                 fill="black"/>
        <circle cx="100" cy="100" r="4" fill="black"/>
    </g>

</svg>

</div>

<script>

function makeTicks(groupID){

    const group = document.getElementById(groupID);

    for(let a=0; a<360; a+=15){

        const line=document.createElementNS("http://www.w3.org/2000/svg","line");

        const r1=(a%90===0)?78:82;
        const r2=88;

        const rad=a*Math.PI/180;

        const x1=100+Math.sin(rad)*r1;
        const y1=100-Math.cos(rad)*r1;

        const x2=100+Math.sin(rad)*r2;
        const y2=100-Math.cos(rad)*r2;

        line.setAttribute("x1",x1);
        line.setAttribute("y1",y1);
        line.setAttribute("x2",x2);
        line.setAttribute("y2",y2);
        line.setAttribute("stroke","black");
        line.setAttribute("stroke-width",(a%90===0)?2:1);

        group.appendChild(line);
    }
}

makeTicks("ticks");
makeTicks("ticks2");

let northAngle=0;
let targetAngle=180;

const needle1=document.getElementById("needle1");
const needle2=document.getElementById("needle2");

function animate(){

    northAngle+=0.5;
    targetAngle-=0.8;

    needle1.setAttribute(
        "transform",
        `rotate(${northAngle} 100 100)`
    );

    needle2.setAttribute(
        "transform",
        `rotate(${targetAngle} 100 100)`
    );

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
